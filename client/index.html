    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        background: #050505;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-loading.done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-loading .hex-wordmark {
        font-family: 'Geist', 'Inter', sans-serif;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.5px;
        color: #fff;
      }
      #app-loading .hex-wordmark span {
        color: #F97316;
      }
      #app-loading .hex-bar {
        width: 120px;
        height: 2px;
        background: #1a1a1a;
        border-radius: 99px;
        overflow: hidden;
      }
      #app-loading .hex-bar-fill {
        height: 100%;
        width: 40%;
        background: #F97316;
        border-radius: 99px;
        animation: hexslide 1.1s ease-in-out infinite;
      }
      @keyframes hexslide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(200%); }
        100% { transform: translateX(200%); }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="hex-wordmark">hex<span>ed</span></div>
      <div class="hex-bar"><div class="hex-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
